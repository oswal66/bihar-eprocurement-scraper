<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bihar eProcurement Tender Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .controls h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        input, select, button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input, select {
            background: #f9f9f9;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .tenders-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-closed {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕷️ Bihar eProcurement Tender Dashboard</h1>
            <p class="subtitle">Real-time tender tracking and monitoring</p>
        </header>

        <div id="alertContainer"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Tenders</div>
                <div class="stat-number" id="totalTenders">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Tenders</div>
                <div class="stat-number" id="activeTenders">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Closed Tenders</div>
                <div class="stat-number" id="closedTenders">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Updated</div>
                <div class="stat-number" id="lastUpdated" style="font-size: 1.2em;">-</div>
            </div>
        </div>

        <div class="controls">
            <h2>Controls & Filters</h2>
            <div class="button-group">
                <button onclick="triggerScrape()">🔄 Trigger Scrape</button>
                <button onclick="refreshData()">🔃 Refresh</button>
                <button onclick="getStatus()">📊 Status</button>
            </div>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search tender..." onkeyup="filterTenders()">
                <select id="statusFilter" onchange="filterTenders()">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
        </div>

        <div class="tenders-table">
            <div id="loadingSpinner" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading tenders...</p>
            </div>
            <div id="noData" class="no-data" style="display: none;">No tenders found</div>
            <table id="tendersTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Tender #</th>
                        <th>Description</th>
                        <th>Department</th>
                        <th>Closing Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tendersBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        let allTenders = [];

        async function loadTenders() {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('tendersTable').style.display = 'none';
            try {
                const response = await fetch(`${API_URL}/api/tenders?limit=1000`);
                const data = await response.json();
                if (data.success) {
                    allTenders = data.data || [];
                    displayTenders();
                    loadStats();
                }
            } catch (error) {
                showAlert('Error loading tenders', 'error');
            } finally {
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        }

        function displayTenders() {
            if (allTenders.length === 0) {
                document.getElementById('noData').style.display = 'block';
                document.getElementById('tendersTable').style.display = 'none';
                return;
            }

            const tbody = document.getElementById('tendersBody');
            tbody.innerHTML = allTenders.map(t => `
                <tr>
                    <td><strong>${t.tender_number}</strong></td>
                    <td>${(t.description || '').substring(0, 50)}...</td>
                    <td>${t.department || 'N/A'}</td>
                    <td>${new Date(t.closing_date).toLocaleDateString()}</td>
                    <td><span class="status-badge status-${(t.status || 'Other').toLowerCase()}">${t.status || 'Other'}</span></td>
                </tr>
            `).join('');

            document.getElementById('tendersTable').style.display = 'table';
            document.getElementById('noData').style.display = 'none';
        }

        function filterTenders() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = allTenders.filter(t => {
                const matchSearch = (t.tender_number || '').toLowerCase().includes(search) ||
                                   (t.description || '').toLowerCase().includes(search);
                const matchStatus = !status || t.status === status;
                return matchSearch && matchStatus;
            });

            const tbody = document.getElementById('tendersBody');
            if (filtered.length === 0) {
                document.getElementById('noData').style.display = 'block';
                document.getElementById('tendersTable').style.display = 'none';
                return;
            }

            tbody.innerHTML = filtered.map(t => `
                <tr>
                    <td><strong>${t.tender_number}</strong></td>
                    <td>${(t.description || '').substring(0, 50)}...</td>
                    <td>${t.department || 'N/A'}</td>
                    <td>${new Date(t.closing_date).toLocaleDateString()}</td>
                    <td><span class="status-badge status-${(t.status || 'Other').toLowerCase()}">${t.status || 'Other'}</span></td>
                </tr>
            `).join('');

            document.getElementById('tendersTable').style.display = 'table';
            document.getElementById('noData').style.display = 'none';
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('totalTenders').textContent = data.totalTenders || 0;
                    document.getElementById('activeTenders').textContent = 
                        (allTenders.filter(t => t.status === 'Active') || []).length;
                    document.getElementById('closedTenders').textContent = 
                        (allTenders.filter(t => t.status === 'Closed') || []).length;
                    const date = new Date(data.lastScrapedAt);
                    document.getElementById('lastUpdated').textContent = date.toLocaleTimeString();
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function triggerScrape() {
            showAlert('Starting scrape...', 'success');
            try {
                const response = await fetch(`${API_URL}/api/scrape/trigger`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showAlert(`Scrape complete! ${data.scrapedCount} found`, 'success');
                    setTimeout(loadTenders, 1000);
                }
            } catch (error) {
                showAlert('Error triggering scrape', 'error');
            }
        }

        async function getStatus() {
            try {
                const response = await fetch(`${API_URL}/api/scrape/status`);
                const data = await response.json();
                if (data.success) {
                    showAlert(`Status: ${data.isScrapingInProgress ? 'Running' : 'Idle'}`, 'success');
                }
            } catch (error) {
                showAlert('Error getting status', 'error');
            }
        }

        function refreshData() {
            loadTenders();
        }

        function showAlert(msg, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = msg;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        window.addEventListener('load', loadTenders);
    </script>
</body>
</html>
